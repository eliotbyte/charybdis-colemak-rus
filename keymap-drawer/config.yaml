# keymap-drawer config (local draw only; not firmware source of truth)
parse_config:
  preprocess: true
  columns: 12
  raw_binding_map:
    "&to_rus": {t: Alt, h: RU}
    "&to_eng": {t: Alt, h: EN}
    "&macro_to_rus": RU
    "&macro_to_eng": EN
    "&hold": {type: held}
    "&studio_unlock": Studio
    "&bootloader": Boot

draw_config:
  key_w: 56
  key_h: 56
  key_rx: 12
  key_ry: 12
  split_gap: 30
  combo_w: 28
  combo_h: 28
  legend_rel_y: 1
  append_colon_to_layer_header: false
  svg_extra_style: |
    @font-face {
      font-family: Inter;
      font-style: normal;
      font-weight: 400;
      src: url("fonts/Inter-latin.woff2") format("woff2");
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: Inter;
      font-style: normal;
      font-weight: 400;
      src: url("fonts/Inter-cyrillic.woff2") format("woff2");
      unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
    }
    svg.keymap {
      font-family: Inter, sans-serif;
      font-weight: 400;
      font-size: 17px;
    }
    svg.keymap text {
      fill: #FFFFFF;
      stroke: url(#text-stroke);
      stroke-opacity: 0.25;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-miterlimit: 1;
      paint-order: stroke fill;
    }
    svg.keymap text.label {
      font-weight: 400;
      font-size: 34px;
      text-anchor: start;
      fill: #FFFFFF;
      stroke: #1b1d1d;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-miterlimit: 1;
      paint-order: stroke fill;
    }
    text.trans {
      fill: #FFFFFF;
      stroke: url(#text-stroke);
      stroke-opacity: 0.25;
    }
    .stacked-line1, .lang-line1 {
      font-size: 13px;
    }
    .stacked-line2, .lang-line2 {
      font-size: 17px;
    }
    .dual-line {
      font-size: 17px;
    }
    .dual-line1 {
      font-size: 13px;
    }
    .dual-line2 {
      font-size: 17px;
    }
    svg.keymap .key-icon path {
      stroke: url(#text-stroke);
      stroke-opacity: 0.25;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-miterlimit: 1;
      paint-order: stroke fill;
    }
    svg.keymap .inline-icon path {
      stroke: url(#text-stroke);
      stroke-opacity: 0.25;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-miterlimit: 1;
      paint-order: stroke fill;
    }
    rect.key-top {
      fill: url(#key-fill);
      filter: url(#key-inner-shadow);
      stroke: none;
    }
    rect.key-top.held, rect.combo.held {
      fill: url(#key-fill);
      filter: url(#key-inner-shadow);
      stroke: none;
    }
    rect.key-base {
      fill: #171717;
      stroke: none;
      filter: url(#key-base-inner-shadow);
    }
    .layer-Lower rect.key-top {
      fill: url(#key-fill-lower);
    }
    .layer-Raise rect.key-top {
      fill: url(#key-fill-raise);
    }
    .layer-Fn rect.key-top {
      fill: url(#key-fill-fn);
    }
